name: İnci Holding Haftalık Bülten

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: |
          pip install --upgrade pip
          pip install "numpy<2" "huggingface_hub==0.20.3"
          pip install torch==2.3.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install "sentence-transformers==2.6.1" \
            feedparser beautifulsoup4 requests python-dateutil \
            deep-translator

      - name: Bülteni üret
        env:
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python inci_haftalik_rapor.py

      - name: docs/ commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Bülten güncellendi — $(date +'Hafta %V, %d %b %Y')"
          git push
